name: AIV Packet Validation (DISABLED — replaced by aiv-guard-python.yml)

# DISABLED: This 2244-line JS guard has been replaced by the Python guard in
# aiv-guard-python.yml which uses the shared aiv.lib validation logic.
# Running both creates a split-brain architecture where two guards with different
# logic validate the same PRs, leading to conflicting results and alert fatigue.
# Preserved for reference only. To re-enable, restore pull_request trigger.
on:
  workflow_dispatch: {}

jobs:
  validate-packet:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
      actions: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Validate PR body contains AIV packet and immutable links
        id: validate
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr?.body || '';

            const fs = require('fs');
            const path = require('path');
            const packetSourceMatch = body.match(/Packet Source:\s*`(.+?)`/);
            const packetSourcePlainMatch = body.match(/Packet Source:\s*(\S+)/);
            let packetContent = body;
            const packetSourcePath = packetSourceMatch?.[1] || packetSourcePlainMatch?.[1] || '';
            if (packetSourcePath) {
              const filePath = String(packetSourcePath || '').trim();
              const githubRoot = path.resolve('.github');
              const resolved = path.resolve(filePath);
              const isWithinGithubRoot = resolved === githubRoot || resolved.startsWith(githubRoot + path.sep);
              if (!filePath.startsWith('.github/') || !isWithinGithubRoot) {
                core.setFailed(`❌ Invalid Packet Source path: ${filePath} (must be within .github/)`);
                return;
              }
              try {
                packetContent = fs.readFileSync(resolved, 'utf8');
                core.info(`✅ Found packet source file: ${filePath}`);
              } catch (err) {
                core.setFailed(`❌ Failed to read packet source at ${filePath}`);
                return;
              }
            }

            let canonicalPacket = null;
            let canonicalMatch = null;
            let overallResult = 'PASS';
            const findings = [];
            const startedAt = new Date().toISOString();
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            core.setOutput('canonical_enabled', 'false');
            core.setOutput('risk_tier', '');
            core.setOutput('aiv_evidence_artifact_id', '');

            const inferRuleId = (message) => {
              const msg = String(message || '');
              const direct = msg.match(/\b(CT-\d{3}|CLS-\d{3}|A-\d{3}|B-\d{3}|C-\d{3}|D-\d{3}|E-\d{3}|F-\d{3}|ATT-\d{3}|G-\d{3}|EIC-\d{3}|COG-\d{3})\b/);
              if (direct && direct[1]) return direct[1];
              if (/known_limitations/i.test(msg)) return 'CT-010';
              if (/sod_mode/i.test(msg) || /\bSoD\b/i.test(msg) || /requires verifier_id to differ/i.test(msg)) return 'CLS-003';
              if (/attestation decision is NON-COMPLIANT/i.test(msg)) return 'G-006';
              if (/attestations must be a non-empty array/i.test(msg)) return 'ATT-001';
              if (/attestation/i.test(msg) && /CONDITIONAL/i.test(msg) && /requires/i.test(msg)) return 'ATT-002';
              if (/CI run/i.test(msg) && /head_sha mismatch/i.test(msg)) return 'CT-005';
              if (/AIV Canonical packet head_sha mismatch/i.test(msg)) return 'CT-005';
              if (/missing required evidence class/i.test(msg) || /Required evidence classes/i.test(msg)) return 'CT-002';

              if (/Class E/i.test(msg) && /links must target commit SHA/i.test(msg)) return 'E-001';
              if (/Class B/i.test(msg) && /links must target commit SHA/i.test(msg)) return 'B-001';
              if (/mutable branch links/i.test(msg) || /blob\/tree links/i.test(msg)) return 'B-001';
              if (/line anchors/i.test(msg)) return 'B-002';
              if (/scope_inventory/i.test(msg) || /Scope inventory/i.test(msg)) return 'B-003';

              if (/test integrity/i.test(msg) && /semantic/i.test(msg)) return 'C-004';
              if (/search_scope/i.test(msg) || /search scope/i.test(msg)) return 'C-001';
              if (/search_method/i.test(msg) || /search method/i.test(msg)) return 'C-002';
              if (/patterns/i.test(msg) && /enumerat/i.test(msg)) return 'C-003';

              return 'CT-001';
            };

            const buildRuleResults = (canonicalEnabled, riskTier, findings) => {
              const tier = typeof riskTier === 'string' ? riskTier : '';
              const isR2Plus = tier === 'R2' || tier === 'R3';
              const isR1Plus = tier === 'R1' || isR2Plus;

              const expectedRules = [
                { rule_id: 'CT-001', applicable: true },
                { rule_id: 'CLS-001', applicable: canonicalEnabled },
                { rule_id: 'CLS-002', applicable: canonicalEnabled },
                { rule_id: 'CLS-003', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'CLS-004', applicable: canonicalEnabled },
                { rule_id: 'CT-002', applicable: canonicalEnabled },
                { rule_id: 'CT-003', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'CT-004', applicable: canonicalEnabled },
                { rule_id: 'CT-005', applicable: canonicalEnabled },
                { rule_id: 'CT-006', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'CT-007', applicable: canonicalEnabled },
                { rule_id: 'CT-008', applicable: canonicalEnabled },
                { rule_id: 'CT-009', applicable: canonicalEnabled },
                { rule_id: 'CT-010', applicable: canonicalEnabled },
                { rule_id: 'G-001', applicable: canonicalEnabled },
                { rule_id: 'G-002', applicable: canonicalEnabled },
                { rule_id: 'G-003', applicable: canonicalEnabled },
                { rule_id: 'G-004', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'G-005', applicable: canonicalEnabled },
                { rule_id: 'EIC-001', applicable: canonicalEnabled },
                { rule_id: 'EIC-002', applicable: canonicalEnabled },
                { rule_id: 'EIC-003', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'EIC-004', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'EIC-005', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'A-001', applicable: canonicalEnabled },
                { rule_id: 'A-002', applicable: canonicalEnabled },
                { rule_id: 'A-003', applicable: canonicalEnabled },
                { rule_id: 'A-004', applicable: canonicalEnabled },
                { rule_id: 'A-005', applicable: canonicalEnabled },
                { rule_id: 'A-006', applicable: canonicalEnabled },
                { rule_id: 'B-001', applicable: canonicalEnabled },
                { rule_id: 'B-002', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'B-003', applicable: canonicalEnabled },
                { rule_id: 'B-004', applicable: canonicalEnabled },
                { rule_id: 'B-005', applicable: canonicalEnabled },
                { rule_id: 'C-001', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'C-002', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'C-003', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'C-004', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'C-005', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'C-006', applicable: canonicalEnabled && isR2Plus },
                { rule_id: 'E-001', applicable: canonicalEnabled && isR1Plus },
                { rule_id: 'E-002', applicable: canonicalEnabled && isR1Plus },
                { rule_id: 'E-003', applicable: canonicalEnabled && isR1Plus },
                { rule_id: 'E-004', applicable: canonicalEnabled && isR1Plus },
                { rule_id: 'E-005', applicable: canonicalEnabled && isR1Plus },
                { rule_id: 'ATT-001', applicable: canonicalEnabled },
                { rule_id: 'ATT-002', applicable: canonicalEnabled },
                { rule_id: 'ATT-004', applicable: canonicalEnabled },
                { rule_id: 'G-006', applicable: canonicalEnabled },
              ];

              const blockFindings = Array.isArray(findings) ? findings.filter((f) => f && f.severity === 'BLOCK') : [];
              const warnFailRules = new Set(['CLS-004', 'A-004', 'A-006', 'B-005', 'C-005', 'C-006', 'E-004', 'E-005']);
              const warnFindings = Array.isArray(findings)
                ? findings.filter((f) => f && f.severity === 'WARN' && typeof f.rule_id === 'string' && warnFailRules.has(f.rule_id))
                : [];

              const failingFindings = [...blockFindings, ...warnFindings];
              const firstFailByRule = new Map();
              for (const f of failingFindings) {
                if (f && typeof f.rule_id === 'string' && f.rule_id && !firstFailByRule.has(f.rule_id)) {
                  firstFailByRule.set(f.rule_id, f);
                }
              }

              const implyFail = (fromRule, toRule) => {
                const f = firstFailByRule.get(fromRule);
                if (f && !firstFailByRule.has(toRule)) firstFailByRule.set(toRule, f);
              };

              implyFail('CT-005', 'A-002');
              implyFail('A-002', 'CT-005');
              implyFail('CT-005', 'EIC-001');
              implyFail('A-002', 'EIC-001');

              implyFail('CT-001', 'G-002');

              implyFail('CT-002', 'G-001');

              implyFail('CT-004', 'G-003');

              implyFail('CT-006', 'CLS-003');
              implyFail('CLS-003', 'CT-006');
              implyFail('CT-006', 'G-004');
              implyFail('CLS-003', 'G-004');

              implyFail('CT-007', 'G-005');

              implyFail('CT-004', 'EIC-002');
              implyFail('B-001', 'EIC-002');

              implyFail('B-003', 'EIC-003');

              implyFail('C-004', 'EIC-004');

              implyFail('E-003', 'EIC-005');
              implyFail('B-004', 'EIC-005');
              implyFail('CT-007', 'ATT-001');
              implyFail('CT-007', 'ATT-002');
              implyFail('ATT-001', 'CT-007');
              implyFail('ATT-002', 'CT-007');
              implyFail('G-006', 'CT-008');
              implyFail('CT-008', 'G-006');

              const results = [];
              for (const r of expectedRules) {
                if (!r.applicable) {
                  results.push({ rule_id: r.rule_id, result: 'SKIP' });
                  continue;
                }

                if (r.defaultResult === 'SKIP') {
                  results.push({ rule_id: r.rule_id, result: 'SKIP' });
                  continue;
                }

                const failing = firstFailByRule.get(r.rule_id);
                if (failing) {
                  results.push({ rule_id: r.rule_id, result: 'FAIL', finding_id: failing.id });
                } else {
                  results.push({ rule_id: r.rule_id, result: 'PASS' });
                }
              }

              const already = new Set(results.map((r) => r.rule_id));
              for (const f of failingFindings) {
                if (f && typeof f.rule_id === 'string' && f.rule_id && !already.has(f.rule_id)) {
                  results.push({ rule_id: f.rule_id, result: 'FAIL', finding_id: f.id });
                }
              }

              return results;
            };

            const originalSetFailed = core.setFailed.bind(core);
            core.setFailed = (message) => {
              overallResult = 'FAIL';
              const ruleId = inferRuleId(message);
              findings.push({
                id: `F-${ruleId}-${findings.length + 1}`,
                severity: 'BLOCK',
                rule_id: ruleId,
                description: String(message),
                remediation: 'Resolve the failing validator output and re-run validation.',
              });
              originalSetFailed(message);
            };

            const originalWarning = core.warning.bind(core);
            core.warning = (message) => {
              const ruleId = inferRuleId(message);
              findings.push({
                id: `F-${ruleId}-WARN-${findings.length + 1}`,
                severity: 'WARN',
                rule_id: ruleId,
                description: String(message),
                remediation: 'Review warning and document justification or remediate.',
              });
              originalWarning(message);
            };

            process.on('exit', () => {
              const canonicalEnabled = Boolean(canonicalMatch);
              const riskTier = canonicalPacket?.classification?.risk_tier || 'R0';
              const complianceLevel = (() => {
                if (!canonicalEnabled) return 'L1';
                if (overallResult !== 'PASS') return 'NON-COMPLIANT';
                if (riskTier === 'R3') return 'L3';
                if (riskTier === 'R2') return 'L2';
                return 'L1';
              })();

              const requiredForTier = (tier) => {
                if (tier === 'R0') return ['A', 'B'];
                if (tier === 'R1') return ['A', 'B', 'E'];
                if (tier === 'R2') return ['A', 'B', 'C', 'E'];
                if (tier === 'R3') return ['A', 'B', 'C', 'D', 'E', 'F'];
                return [];
              };

              const evidenceItems = Array.isArray(canonicalPacket?.evidence_items)
                ? canonicalPacket.evidence_items
                : [];

              const requiredClasses = requiredForTier(riskTier);
              const allClasses = ['A', 'B', 'C', 'D', 'E', 'F'];
              const evidenceClassResults = allClasses.map((cls) => {
                const present = evidenceItems.some((e) => e && e.class === cls);
                const required = requiredClasses.includes(cls);
                return {
                  class: cls,
                  required,
                  present,
                  valid: required ? present : present,
                  findings: [],
                };
              });

              const result = {
                validation_result: {
                  validator_id: 'aiv-guard@1.0.0',
                  packet_id: String(canonicalPacket?.identification?.pr_id ?? pr?.number ?? ''),
                  repository: `${context.repo.owner}/${context.repo.repo}`,
                  pr_id: pr?.number ?? 0,
                  head_sha: pr?.head?.sha ?? '',
                  validated_at: startedAt,
                  overall_result: overallResult === 'PASS' ? 'PASS' : 'FAIL',
                  compliance_level: complianceLevel,
                  risk_tier_validated: riskTier,
                  evidence_class_results: evidenceClassResults,
                  validation_rule_results: buildRuleResults(canonicalEnabled, riskTier, findings),
                  findings,
                  block_count: findings.filter((f) => f.severity === 'BLOCK').length,
                  warn_count: findings.filter((f) => f.severity === 'WARN').length,
                  info_count: findings.filter((f) => f.severity === 'INFO').length,
                },
              };

              fs.writeFileSync('aiv_validation_result.json', `${JSON.stringify(result, null, 2)}\n`);
            });

            const required = [
              '# AIV Verification Packet (v2.1)',
              '## Claim(s)',
              '## Evidence',
              '### Class E (Intent Alignment)',
              '### Class B (Referential Evidence)',
              '### Class A (Execution Evidence)',
              '## Summary',
            ];

            const optionalSections = [
              '## Verification Methodology',
              '## Reproduction',
            ];

            const canonicalBlockRe = /```aiv-canonical-json\s*([\s\S]*?)```/m;
            canonicalMatch = packetContent.match(canonicalBlockRe);

            core.setOutput('canonical_enabled', canonicalMatch ? 'true' : 'false');

            const hasAtLeastOneOptional = optionalSections.some((h) => packetContent.includes(h));

            const missing = required.filter((h) => !packetContent.includes(h));

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            let cachedChangedFiles = null;
            const getChangedFiles = async () => {
              if (Array.isArray(cachedChangedFiles)) return cachedChangedFiles;

              const files = [];
              let page = 1;
              const MAX_PAGES = 100;
              while (true) {
                if (page > MAX_PAGES) {
                  core.warning(`Reached maximum page limit (${MAX_PAGES}). Some files may not be checked.`);
                  break;
                }

                const resp = await github.rest.pulls.listFiles({
                  owner,
                  repo,
                  pull_number,
                  per_page: 100,
                  page,
                });

                if (!resp.data || resp.data.length === 0) break;
                files.push(
                  ...resp.data.map((f) => ({
                    filename: f.filename,
                    patch: typeof f.patch === 'string' ? f.patch : '',
                    status: f.status,
                  })),
                );
                if (resp.data.length < 100) break;
                page += 1;
              }

              cachedChangedFiles = files;
              return files;
            };

            const getChangedPaths = async () => {
              const files = await getChangedFiles();
              return files.map((f) => f.filename);
            };

            const allowedExtensions = ['.md', '.txt'];
            const allowedExactNames = ['.gitignore', '.editorconfig'];

            const isFastTrackEligible = async () => {
              const changedPaths = await getChangedPaths();
              return (
                changedPaths.length > 0 &&
                changedPaths.every((p) => {
                  const basename = p.split('/').pop() || p;
                  if (allowedExactNames.includes(basename)) return true;
                  return allowedExtensions.some((ext) => p.endsWith(ext));
                })
              );
            };

            if (!canonicalMatch) {
              const fastTrackEligible = await isFastTrackEligible();
              if (!fastTrackEligible) {
                core.warning('⚠️ CT-001 AIV Canonical packet block (```aiv-canonical-json ... ```) is missing; continuing with markdown-only packet validation.');
              }
            }

            if (!canonicalMatch && (missing.length > 0 || !hasAtLeastOneOptional)) {
              if (!hasAtLeastOneOptional && missing.length === 0) {
                core.setFailed('Missing required section: Must include either "## Verification Methodology" or "## Reproduction"');
                return;
              }
              
              if (missing.length === 0) {
                // All required sections present, optional check already passed
                // Continue to immutability checks
              } else {
              const fastTrackEligible = await isFastTrackEligible();

              if (fastTrackEligible) {
                core.info('⚠️ Missing AIV Packet sections, but PR is Fast-Track eligible (docs-only).');
                core.info(`Missing sections: ${missing.join(', ')}`);
                return;
              }

              core.setFailed(`Missing required packet sections: ${missing.join(', ')}`);
              return;
              }
            }

            const mutableBranchPattern = /\/(blob|tree)\/(main|master|develop|dev|staging)\//;

            const extractSection = (header) => {
              const re = new RegExp(`${header}[\\s\\S]*?(?=### |## |$)`, 'm');
              const match = packetContent.match(re);
              return match ? match[0] : null;
            };

            const classE = extractSection('### Class E \\(Intent Alignment\\)');
            if (classE && mutableBranchPattern.test(classE)) {
              core.setFailed(
                '❌ Class E links must target commit SHA, not mutable branch (main/master/develop/dev/staging).'
              );
              return;
            }

            const classB = extractSection('### Class B \\(Referential Evidence\\)');
            if (classB && mutableBranchPattern.test(classB)) {
              core.setFailed(
                '❌ Class B links must target commit SHA, not mutable branch (main/master/develop/dev/staging).'
              );
              return;
            }

            core.info('✅ AIV Packet structure validated');
            core.info('✅ Class E and Class B links are immutable');

            if (!canonicalMatch) {
              core.info('ℹ️ No AIV Canonical packet found (```aiv-canonical-json ... ```); skipping Canonical validation.');
              return;
            }

            try {
              canonicalPacket = JSON.parse(canonicalMatch[1]);
            } catch (err) {
              core.setFailed('❌ AIV Canonical packet block found, but it is not valid JSON.');
              return;
            }

            const headSha = pr?.head?.sha;
            if (!headSha) {
              core.setFailed('❌ Unable to determine PR head SHA from GitHub context.');
              return;
            }

            const getPath = (obj, pathArr) => {
              return pathArr.reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : undefined), obj);
            };

            const requiredCanonicalFields = [
              ['aiv_version'],
              ['packet_schema_version'],
              ['identification', 'head_sha'],
              ['identification', 'pr_id'],
              ['identification', 'pr_url'],
              ['identification', 'base_sha'],
              ['identification', 'created_at'],
              ['identification', 'created_by'],
              ['classification', 'risk_tier'],
              ['classification', 'sod_mode'],
              ['classification', 'blast_radius'],
              ['classification', 'classification_rationale'],
              ['classification', 'classified_by'],
              ['classification', 'classified_at'],
              ['claims'],
              ['evidence_items'],
              ['attestations'],
              ['known_limitations'],
            ];

            const missingCanonical = requiredCanonicalFields
              .filter((p) => getPath(canonicalPacket, p) === undefined)
              .map((p) => p.join('.'));

            if (missingCanonical.length > 0) {
              const missingCls004 = missingCanonical.includes('classification.classification_rationale');
              const remainingMissing = missingCanonical.filter((f) => f !== 'classification.classification_rationale');

              if (missingCls004) {
                core.warning('⚠️ CLS-004 AIV Canonical packet classification.classification_rationale must be documented.');
              }

              if (remainingMissing.length === 0) {
                // Only CLS-004 is missing; continue validation since CLS-004 is WARN severity.
              } else {
              core.setFailed(
                `❌ AIV Canonical packet is missing required fields: ${remainingMissing.join(', ')}`,
              );
              return;
              }
            }

            if (getPath(canonicalPacket, ['classification', 'classification_rationale']) !== undefined) {
              if (typeof canonicalPacket.classification.classification_rationale !== 'string' || !canonicalPacket.classification.classification_rationale.trim()) {
                core.warning('⚠️ CLS-004 AIV Canonical packet classification.classification_rationale should be a non-empty string.');
              }
            }

            if (canonicalPacket.aiv_version !== '1.0.0') {
              core.setFailed(
                `❌ AIV Canonical packet aiv_version must be "1.0.0" (got: ${canonicalPacket.aiv_version})`,
              );
              return;
            }

            if (canonicalPacket.packet_schema_version !== '1.0.0') {
              core.setFailed(
                `❌ AIV Canonical packet packet_schema_version must be "1.0.0" (got: ${canonicalPacket.packet_schema_version})`,
              );
              return;
            }

            const isHexSha40Or64 = (s) => typeof s === 'string' && /^[0-9a-f]{40}([0-9a-f]{24})?$/i.test(s);

            if (!isHexSha40Or64(canonicalPacket.identification.head_sha)) {
              core.setFailed('❌ AIV Canonical packet identification.head_sha must be a 40- or 64-character hex SHA.');
              return;
            }

            if (canonicalPacket.identification.pr_id !== pr.number) {
              core.setFailed(
                `❌ AIV Canonical packet identification.pr_id mismatch. Packet: ${canonicalPacket.identification.pr_id}, PR: ${pr.number}`,
              );
              return;
            }

            if (typeof canonicalPacket.identification.pr_url !== 'string' || !canonicalPacket.identification.pr_url.includes(`/pull/${pr.number}`)) {
              core.setFailed('❌ AIV Canonical packet identification.pr_url must reference this PR number.');
              return;
            }

            const baseSha = pr?.base?.sha;
            if (!baseSha) {
              core.setFailed('❌ Unable to determine PR base SHA from GitHub context.');
              return;
            }

            if (!isHexSha40Or64(canonicalPacket.identification.base_sha)) {
              core.setFailed('❌ AIV Canonical packet identification.base_sha must be a 40- or 64-character hex SHA.');
              return;
            }

            if (canonicalPacket.identification.base_sha.toLowerCase() !== baseSha.toLowerCase()) {
              core.setFailed(
                `❌ AIV Canonical packet base_sha mismatch. Packet: ${canonicalPacket.identification.base_sha}, PR: ${baseSha}`,
              );
              return;
            }

            if (canonicalPacket.identification.head_sha.toLowerCase() !== headSha.toLowerCase()) {
              core.setFailed(
                `❌ AIV Canonical packet head_sha mismatch. Packet: ${canonicalPacket.identification.head_sha}, PR: ${headSha}`,
              );
              return;
            }

            const riskTier = canonicalPacket.classification.risk_tier;
            if (!['R0', 'R1', 'R2', 'R3'].includes(riskTier)) {
              core.setFailed(`❌ AIV Canonical packet classification.risk_tier must be one of R0,R1,R2,R3 (got: ${riskTier})`);
              return;
            }

            core.setOutput('risk_tier', String(riskTier));

            {
              const changedFiles = await getChangedFiles();

              const shouldFetchContentAtHead = (path) => {
                return /\.(ts|tsx|js|jsx|mjs|cjs|astro|sh|bash|yml|yaml|json|toml|ini|env)$/i.test(path);
              };

              const getFileContentAtHead = async (path) => {
                try {
                  const resp = await github.rest.repos.getContent({
                    owner,
                    repo,
                    path,
                    ref: headSha,
                  });

                  if (!resp.data || Array.isArray(resp.data)) return null;
                  const data = resp.data;
                  if (typeof data.encoding !== 'string' || data.encoding !== 'base64') return null;
                  if (typeof data.content !== 'string' || !data.content) return null;
                  return Buffer.from(data.content, 'base64').toString('utf8');
                } catch {
                  return null;
                }
              };

              const criticalSurfacePathPatterns = [
                { surface: 'Authentication', re: /(^|\/)(auth|authentication|login|session|token|oauth|sso)(\/|$)/i },
                { surface: 'Authorization', re: /(^|\/)(authz|authorization|rbac|acl|permission|permissions|policy|policies)(\/|$)/i },
                { surface: 'Secrets Management', re: /(^|\/)(secret|secrets|vault|apikey|api_key|credential|credentials|password|\.env)(\/|$)/i },
                { surface: 'Cryptography', re: /(^|\/)(crypto|cryptography|encrypt|encryption|cipher|signature|signing|hash)(\/|$)/i },
                { surface: 'Privilege Boundaries', re: /(^|\/)(sandbox|privilege|capability|capabilities|setuid|docker|container)(\/|$)/i },
                { surface: 'Audit/Logging', re: /(^|\/)(audit|audit[-_]?log|audittrail|security[-_]?log|security[-_]?event|event[-_]?log|ledger)(\/|$)/i },
                { surface: 'PII Handling', re: /(^|\/)(pii|privacy|gdpr|redact|sanitiz)(\/|$)/i },
              ];

              const criticalSurfaceSemanticPatterns = [
                {
                  surface: 'Authentication',
                  re: /\b(timingSafeEqual|verify[_-]?token|tokenMatches|token[-_ ]gated|HEALTHCHECK_TOKEN|AUDIT_LINK_SECRET)\b/i,
                },
                {
                  surface: 'Authorization',
                  re: /\b(rbac|acl|permission|permissions|policy|capabilit(y|ies)|grant|deny|allowlist|access[_-]?control)\b/i,
                },
                {
                  surface: 'Secrets Management',
                  re: /\bprocess\.env\.[A-Z0-9_]*(SECRET|TOKEN|KEY)\b|\b(AUDIT_LINK_SECRET|BB_PGP_PASSPHRASE|BB_PII_SALT)\b/i,
                },
                {
                  surface: 'Cryptography',
                  re: /\b(createHmac|HMAC[_-]?SHA256|sha256|sha512|crypto\.|gpg(Clearsign|Verify)?|clearsign|signature|signing|verify)\b/i,
                },
                {
                  surface: 'Privilege Boundaries',
                  re: /\b(no-new-privileges|cap_drop|--cap-drop|--security-opt|security_opt|network_mode\s*:\s*["']none["'])\b/i,
                },
                {
                  surface: 'Audit/Logging',
                  re: /\b(audit[_-]?log|analysis_ledger|destruction_ledger|ledger|hash[-_ ]chained|tamper[-_ ]evident|append[-_ ]only)\b/i,
                },
                {
                  surface: 'PII Handling',
                  re: /\b(PII|email|ip address|redact|redaction|declassif|sanitize|anonymiz)\b/i,
                },
              ];

              const hits = new Set();
              for (const f of changedFiles) {
                const p = f.filename;
                const patch = typeof f.patch === 'string' ? f.patch : '';

                for (const pat of criticalSurfacePathPatterns) {
                  if (pat.re.test(p)) hits.add(pat.surface);
                }

                let semanticText = patch;
                if (!semanticText && shouldFetchContentAtHead(p)) {
                  const content = await getFileContentAtHead(p);
                  if (typeof content === 'string') semanticText = content;
                }

                if (semanticText) {
                  const haystack = `${p}\n${semanticText}`;
                  for (const pat of criticalSurfaceSemanticPatterns) {
                    if (pat.re.test(haystack)) hits.add(pat.surface);
                  }
                }
              }

              if (hits.size > 0 && riskTier !== 'R3') {
                core.setFailed(
                  `❌ CLS-002 Change touches critical surfaces (${Array.from(hits).join(', ')}); classification.risk_tier MUST be R3.`,
                );
                return;
              }

              if (riskTier === 'R3') {
                const cs = canonicalPacket.classification.critical_surfaces;
                if (!Array.isArray(cs) || cs.length === 0) {
                  core.setFailed('❌ CLS-002 R3 classification requires classification.critical_surfaces to be a non-empty array.');
                  return;
                }

                const missing = Array.from(hits).filter((s) => !cs.includes(s));
                if (missing.length > 0) {
                  core.setFailed(
                    `❌ CLS-002 R3 classification critical_surfaces is missing detected surfaces: ${missing.join(', ')}.`,
                  );
                  return;
                }
              }
            }

            const sodMode = canonicalPacket.classification.sod_mode;
            if (!['S0', 'S1'].includes(sodMode)) {
              core.setFailed(`❌ AIV Canonical packet classification.sod_mode must be S0 or S1 (got: ${sodMode})`);
              return;
            }

            if (['R2', 'R3'].includes(riskTier) && sodMode !== 'S1') {
              core.setFailed('❌ AIV Canonical packet R2+ requires classification.sod_mode = S1.');
              return;
            }

            const attestations = canonicalPacket.attestations;
            if (!Array.isArray(attestations) || attestations.length === 0) {
              core.setFailed('❌ AIV Canonical packet attestations must be a non-empty array.');
              return;
            }

            const att = attestations[0];
            if (!att || typeof att.id !== 'string' || !att.id.trim()) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation id is required.');
              return;
            }

            if (!att || typeof att.verifier_id !== 'string' || !att.verifier_id.trim()) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation verifier_id is required.');
              return;
            }

            if (typeof att.verifier_identity_type !== 'string' || !att.verifier_identity_type.trim()) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation verifier_identity_type is required.');
              return;
            }

            if (typeof att.timestamp !== 'string' || Number.isNaN(Date.parse(att.timestamp))) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation timestamp must be valid ISO-8601.');
              return;
            }

            if (!Array.isArray(att.evidence_classes_validated) || att.evidence_classes_validated.length === 0) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation evidence_classes_validated must be a non-empty array.');
              return;
            }

            if (!Array.isArray(att.validation_rules_checked) || att.validation_rules_checked.length === 0) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation validation_rules_checked must be a non-empty array.');
              return;
            }

            if (!Array.isArray(att.findings)) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation findings must be present (may be empty).');
              return;
            }

            if (typeof att.signature_method !== 'string' || !att.signature_method.trim()) {
              core.setFailed('❌ ATT-002 AIV Canonical packet attestation signature_method is required.');
              return;
            }

            if (att.signature_method !== 'unsigned') {
              if (typeof att.signature !== 'string' || !att.signature.trim()) {
                core.setFailed('❌ ATT-002 AIV Canonical packet attestation signature is required when signature_method is not unsigned.');
                return;
              }
              if (!Array.isArray(att.signed_fields) || att.signed_fields.length === 0) {
                core.setFailed('❌ ATT-002 AIV Canonical packet attestation signed_fields must be a non-empty array when signature_method is not unsigned.');
                return;
              }
            }

            if (['R2', 'R3'].includes(riskTier) && att.verifier_id === canonicalPacket.identification.created_by) {
              core.setFailed('❌ AIV Canonical packet R2+ requires verifier_id to differ from created_by (SoD).');
              return;
            }

            const decision = att.decision;
            if (!['COMPLIANT', 'CONDITIONAL', 'NON-COMPLIANT'].includes(decision)) {
              core.setFailed(`❌ CT-008 AIV Canonical packet attestation decision invalid: ${decision}`);
              return;
            }

            if (decision === 'NON-COMPLIANT') {
              if (!Array.isArray(att.blocking_findings) || att.blocking_findings.length === 0) {
                core.setFailed('❌ ATT-002 NON-COMPLIANT decisions require blocking_findings.');
                return;
              }
              if (typeof att.rationale !== 'string' || !att.rationale.trim()) {
                core.setFailed('❌ ATT-002 NON-COMPLIANT decisions require rationale.');
                return;
              }

              core.setFailed('❌ AIV Canonical packet attestation decision is NON-COMPLIANT.');
              return;
            }

            if (decision === 'CONDITIONAL') {
              const hasBlock = att.findings.some((f) => f && f.severity === 'BLOCK');
              if (hasBlock) {
                core.setFailed('❌ ATT-004 CONDITIONAL decision MUST NOT be used to bypass BLOCK-severity findings.');
                return;
              }

              const warnFindings = att.findings.filter((f) => f && f.severity === 'WARN' && typeof f.id === 'string' && f.id.trim());
              if (warnFindings.length === 0) {
                core.setFailed('❌ CT-009 CONDITIONAL decisions must include at least one WARN finding with a remediation plan.');
                return;
              }

              if (!Array.isArray(att.conditions) || att.conditions.length === 0) {
                core.setFailed('❌ CT-009 AIV Canonical packet CONDITIONAL decision requires non-empty conditions.');
                return;
              }

              const warnIds = new Set(warnFindings.map((f) => f.id));
              for (const c of att.conditions) {
                const id = c && typeof c.finding_id === 'string' ? c.finding_id.trim() : '';
                if (id && !warnIds.has(id)) {
                  core.setFailed('❌ CT-009 CONDITIONAL conditions must reference WARN findings only.');
                  return;
                }
              }
              for (const wid of warnIds) {
                const has = att.conditions.some((c) => c && typeof c.finding_id === 'string' && c.finding_id.trim() === wid);
                if (!has) {
                  core.setFailed('❌ CT-009 A remediation condition is required for each WARN finding.');
                  return;
                }
              }

              const tsMs = Date.parse(att.timestamp);
              const maxDeadlineMs = tsMs + 30 * 24 * 60 * 60 * 1000;

              for (const c of att.conditions) {
                if (!c || typeof c.finding_id !== 'string' || !c.finding_id.trim()) {
                  core.setFailed('❌ CT-009 CONDITIONAL conditions must include finding_id.');
                  return;
                }
                if (typeof c.remediation_plan !== 'string' || !c.remediation_plan.trim()) {
                  core.setFailed('❌ CT-009 CONDITIONAL conditions must include remediation_plan.');
                  return;
                }
                if (typeof c.responsible_party !== 'string' || !c.responsible_party.trim()) {
                  core.setFailed('❌ CT-009 CONDITIONAL conditions must include responsible_party.');
                  return;
                }
                if (typeof c.remediation_deadline !== 'string' || Number.isNaN(Date.parse(c.remediation_deadline))) {
                  core.setFailed('❌ CT-009 CONDITIONAL conditions must include a valid ISO-8601 remediation_deadline.');
                  return;
                }
                const d = Date.parse(c.remediation_deadline);
                if (Number.isFinite(d) && d > maxDeadlineMs) {
                  core.setFailed('❌ CT-009 CONDITIONAL remediation_deadline must not exceed 30 days.');
                  return;
                }
              }
            }

            const changedPaths = await getChangedPaths();

            if (!Array.isArray(canonicalPacket.known_limitations) || canonicalPacket.known_limitations.length === 0) {
              core.setFailed('❌ AIV Canonical packet known_limitations must be a non-empty array.');
              return;
            }

            const allLimitationsValid = canonicalPacket.known_limitations.every(
              (l) => typeof l === 'string' && l.trim().length > 0,
            );

            if (!allLimitationsValid) {
              core.setFailed('❌ AIV Canonical packet known_limitations entries must be non-empty strings.');
              return;
            }

            const evidenceItems = canonicalPacket.evidence_items;
            if (!Array.isArray(evidenceItems) || evidenceItems.length === 0) {
              core.setFailed('❌ AIV Canonical packet evidence_items must be a non-empty array.');
              return;
            }

            const claims = canonicalPacket.claims;
            if (!Array.isArray(claims) || claims.length === 0) {
              core.setFailed('❌ AIV Canonical packet claims must be a non-empty array.');
              return;
            }

            const claimIds = new Set(claims.filter((c) => c && typeof c.id === 'string' && c.id.trim()).map((c) => c.id));

            for (let i = 0; i < evidenceItems.length; i++) {
              const item = evidenceItems[i];
              if (!item || typeof item.id !== 'string' || item.id.trim().length === 0) {
                core.setFailed(`❌ AIV Canonical packet evidence_items[${i}] is missing a valid id.`);
                return;
              }

              if (!Array.isArray(item.claim_refs) || item.claim_refs.length === 0) {
                core.setFailed(`❌ CT-001 AIV Canonical packet evidence_items[${i}] claim_refs must be a non-empty array.`);
                return;
              }

              for (const cref of item.claim_refs) {
                if (typeof cref !== 'string' || !claimIds.has(cref)) {
                  core.setFailed(`❌ CT-001 AIV Canonical packet evidence_items[${i}] claim_refs references missing claim id: ${cref}`);
                  return;
                }
              }
            }

            const evidenceIds = new Set(evidenceItems.map((e) => e.id));

            const parseInline = (ref) => {
              if (typeof ref !== 'string') return null;
              if (ref.startsWith('inline-b64-json:')) {
                try {
                  const payload = ref.slice('inline-b64-json:'.length).trim();
                  const decoded = Buffer.from(payload, 'base64').toString('utf8');
                  return JSON.parse(decoded);
                } catch {
                  return null;
                }
              }
              if (ref.startsWith('inline-json:')) {
                try {
                  const payload = ref.slice('inline-json:'.length).trim();
                  return JSON.parse(payload);
                } catch {
                  return null;
                }
              }
              if (ref.startsWith('inline-lines:')) {
                const payload = ref.slice('inline-lines:'.length);
                return payload
                  .split('\n')
                  .map((s) => s.trim())
                  .filter(Boolean);
              }
              return null;
            };

            const classEItems = evidenceItems.filter((e) => e && e.class === 'E');
            for (const e of classEItems) {
              const reqRefArtifact = Array.isArray(e.artifacts)
                ? e.artifacts.find((a) => a && typeof a.type === 'string' && a.type === 'requirement_reference')
                : null;

              if (!reqRefArtifact || typeof reqRefArtifact.reference !== 'string' || !reqRefArtifact.reference.trim()) {
                core.setFailed(`❌ E-001 Requirement reference artifact (type: requirement_reference) is required for Class E evidence item: ${e.id}`);
                return;
              }

              {
                const ref = reqRefArtifact.reference.trim();
                const isContentAddressed =
                  /^sha256:[0-9a-f]{64}$/i.test(ref) ||
                  /^urn:sha256:[0-9a-f]{64}$/i.test(ref) ||
                  /^ipfs:\/\//i.test(ref) ||
                  /^oci:\/\//i.test(ref);

                const isGitHubShaPermalink =
                  typeof ref === 'string' &&
                  /github\.com\/[^/]+\/[^/]+\/(blob|tree)\/[0-9a-f]{40}([0-9a-f]{24})?(\/|$)/i.test(ref);

                const parsedReq = parseInline(ref);
                const isInlineObject = parsedReq && typeof parsedReq === 'object' && !Array.isArray(parsedReq);

                if (isContentAddressed) {
                  // OK: content-addressed reference
                } else if (isInlineObject) {
                  const immutable = parsedReq.immutable;
                  if (immutable === true) {
                    // OK: explicitly marked immutable
                  } else if (immutable === false) {
                    if (riskTier === 'R3') {
                      core.setFailed('❌ E-001 Mutable requirement reference is not permitted for L3/R3.');
                      return;
                    }

                    const so = parsedReq.snapshot_obligation;
                    const hasSo = so && typeof so === 'object' && !Array.isArray(so);
                    const requiredBy = hasSo ? so.required_by : null;
                    const snapshotMethod = hasSo ? so.snapshot_method : null;
                    const responsibleParty = hasSo ? so.responsible_party : null;

                    const contentSummary = parsedReq.content_summary;
                    const verifiedAt = parsedReq.verified_at;

                    const requiredByOk = typeof requiredBy === 'string' && !Number.isNaN(Date.parse(requiredBy));
                    const methodOk = typeof snapshotMethod === 'string' && snapshotMethod.trim();
                    const partyOk = typeof responsibleParty === 'string' && responsibleParty.trim();
                    const summaryOk = typeof contentSummary === 'string' && contentSummary.trim();
                    const verifiedOk = typeof verifiedAt === 'string' && !Number.isNaN(Date.parse(verifiedAt));

                    if (!requiredByOk || !methodOk || !partyOk || !summaryOk || !verifiedOk) {
                      core.warning(
                        `⚠️ E-001 Mutable requirement reference used without a complete snapshot_obligation/content_summary/verified_at structure for Class E evidence item: ${e.id}`,
                      );
                    } else {
                      core.warning(
                        `⚠️ E-001 Mutable requirement reference allowed for L1/L2 with snapshot_obligation for Class E evidence item: ${e.id}`,
                      );
                    }
                  } else {
                    if (riskTier === 'R3') {
                      core.setFailed('❌ E-001 Requirement reference inline object must include immutable: true|false (L3 requires immutable).');
                      return;
                    }
                    core.warning(
                      `⚠️ E-001 Requirement reference inline object should include immutable: true|false and snapshot_obligation when mutable (Class E evidence item: ${e.id})`,
                    );
                  }
                } else if (/^https?:\/\//i.test(ref) && !isGitHubShaPermalink) {
                  if (riskTier === 'R3') {
                    core.setFailed('❌ E-001 Requirement reference must be immutable for L3/R3 (use SHA-bound permalink or content-addressed snapshot).');
                    return;
                  }
                  core.warning(
                    `⚠️ E-001 Requirement reference appears to be a mutable URL. For L1/L2 transitional compliance, encode requirement_reference as inline-json with snapshot_obligation (Class E evidence item: ${e.id})`,
                  );
                }
              }

              if (!Array.isArray(e.claim_refs) || e.claim_refs.length === 0) {
                core.setFailed(`❌ E-002 Each requirement MUST map to at least one claim. Missing claim_refs for Class E evidence item: ${e.id}`);
                return;
              }

              const checklistArtifact = Array.isArray(e.artifacts)
                ? e.artifacts.find((a) => a && typeof a.type === 'string' && a.type === 'acceptance_checklist')
                : null;

              if (!checklistArtifact || typeof checklistArtifact.reference !== 'string' || !checklistArtifact.reference.trim()) {
                core.warning(`⚠️ E-004 Acceptance checklist missing for Class E evidence item: ${e.id}`);
                continue;
              }

              const parsed = parseInline(checklistArtifact.reference);
              if (parsed === null) {
                core.warning(`⚠️ E-004 Acceptance checklist reference not machine-parseable (use inline-json:, inline-b64-json:, or inline-lines:) for Class E evidence item: ${e.id}`);
                continue;
              }

              const items = Array.isArray(parsed)
                ? parsed
                : parsed && typeof parsed === 'object' && Array.isArray(parsed.items)
                  ? parsed.items
                  : null;

              if (!Array.isArray(items) || items.length === 0) {
                core.warning(`⚠️ E-004 Acceptance checklist must be a non-empty array (or {items:[...]}) for Class E evidence item: ${e.id}`);
                continue;
              }

              const allowed = new Set(['satisfied', 'na', 'n/a', 'out-of-scope', 'out_of_scope']);
              const outOfScopeMissingJustification = items.filter((it) => {
                if (!it || typeof it !== 'object') return false;
                const status = typeof it.status === 'string' ? it.status.trim().toLowerCase() : '';
                if (status !== 'out-of-scope' && status !== 'out_of_scope') return false;
                const just = typeof it.justification === 'string' ? it.justification.trim() : '';
                return !just;
              });
              const incomplete = items.some((it) => {
                if (!it || typeof it !== 'object') return true;
                const status = typeof it.status === 'string' ? it.status.trim().toLowerCase() : '';
                if (!status) return true;
                if (status === 'unmarked' || status === 'todo') return true;
                return !allowed.has(status);
              });

              if (outOfScopeMissingJustification.length > 0) {
                const ids = outOfScopeMissingJustification
                  .map((it) => (typeof it.id === 'string' && it.id.trim() ? it.id.trim() : 'unknown'))
                  .slice(0, 10)
                  .join(', ');
                core.warning(`⚠️ E-005 Out-of-scope acceptance checklist items must include a non-empty justification (Class E evidence item: ${e.id}). Items: ${ids}`);
              }

              if (incomplete) {
                core.warning(`⚠️ E-004 Acceptance checklist incomplete (unmarked or invalid status) for Class E evidence item: ${e.id}`);
              }
            }

            const readScopeInventory = () => {
              const items = Array.isArray(canonicalPacket.evidence_items) ? canonicalPacket.evidence_items : [];
              const bItems = items.filter((e) => e && e.class === 'B');
              for (const e of bItems) {
                if (!Array.isArray(e.artifacts)) continue;
                for (const a of e.artifacts) {
                  if (!a || a.type !== 'scope_inventory' || typeof a.reference !== 'string') continue;
                  const ref = a.reference;
                  if (ref.startsWith('inline-b64-json:')) {
                    try {
                      const b64 = ref.slice('inline-b64-json:'.length);
                      const decoded = Buffer.from(b64, 'base64').toString('utf8');
                      const parsed = JSON.parse(decoded);
                      return Array.isArray(parsed) ? parsed : null;
                    } catch (err) {
                      core.setFailed('❌ AIV Canonical packet scope_inventory inline-b64-json could not be decoded/parsed as JSON.');
                      return null;
                    }
                  }
                  if (ref.startsWith('inline-json:')) {
                    try {
                      const decoded = ref.slice('inline-json:'.length);
                      const parsed = JSON.parse(decoded);
                      return Array.isArray(parsed) ? parsed : null;
                    } catch (err) {
                      core.setFailed('❌ AIV Canonical packet scope_inventory inline-json could not be parsed as JSON.');
                      return null;
                    }
                  }
                  if (ref.startsWith('inline-lines:')) {
                    const decoded = ref.slice('inline-lines:'.length);
                    return decoded
                      .split('\n')
                      .map((p) => p.trim())
                      .filter(Boolean);
                  }
                  core.setFailed('❌ AIV Canonical packet scope_inventory reference must use inline-b64-json:, inline-json:, or inline-lines:.');
                  return null;
                }
              }
              return null;
            };

            const scopeInventory = readScopeInventory();
            if (!Array.isArray(scopeInventory) || scopeInventory.length === 0) {
              core.setFailed('❌ AIV Canonical packet must include Class B scope inventory evidence (artifact type: scope_inventory).');
              return;
            }

            const changedSet = new Set(changedPaths);
            const invSet = new Set(scopeInventory.filter((p) => typeof p === 'string' && p.trim()).map((p) => p.trim()));
            const missingFromInventory = changedPaths.filter((p) => !invSet.has(p));
            const extraInInventory = [...invSet].filter((p) => !changedSet.has(p));

            if (missingFromInventory.length > 0 || extraInInventory.length > 0) {
              const missingPreview = missingFromInventory.slice(0, 25).join(', ');
              const extraPreview = extraInInventory.slice(0, 25).join(', ');
              core.setFailed(
                `❌ AIV Canonical packet scope inventory does not match PR diff. Missing: ${missingPreview}${missingFromInventory.length > 25 ? ' ...' : ''} | Extra: ${extraPreview}${extraInInventory.length > 25 ? ' ...' : ''}`,
              );
              return;
            }

            for (const claim of claims) {
              if (!claim || typeof claim.id !== 'string' || !claim.id.trim()) {
                core.setFailed('❌ AIV Canonical packet claim is missing a valid id.');
                return;
              }

              if (!Array.isArray(claim.evidence_refs) || claim.evidence_refs.length === 0) {
                core.setFailed(`❌ E-003 AIV Canonical packet claim ${claim.id} must include evidence_refs.`);
                return;
              }

              for (const ref of claim.evidence_refs) {
                if (!evidenceIds.has(ref)) {
                  core.setFailed(`❌ E-003 AIV Canonical packet claim ${claim.id} references missing evidence id: ${ref}`);
                  return;
                }
              }

              const hasReferential = claim.evidence_refs.some((ref) => {
                const ev = evidenceItems.find((e) => e && e.id === ref);
                return ev && ev.class === 'B';
              });
              if (!hasReferential) {
                core.setFailed(`❌ B-004 Each claim MUST have referential evidence (Class B). Missing for claim: ${claim.id}`);
                return;
              }
            }

            const classAItems = evidenceItems.filter((e) => e && e.class === 'A');
            if (classAItems.length === 0) {
              core.setFailed('❌ AIV Canonical L1 requires at least one Class A evidence item.');
              return;
            }

            const requiredEvidenceClasses = (() => {
              if (riskTier === 'R0') return ['A', 'B'];
              if (riskTier === 'R1') return ['A', 'B', 'E'];
              if (riskTier === 'R2') return ['A', 'B', 'C', 'E'];
              return ['A', 'B', 'C', 'D', 'E', 'F'];
            })();

            for (const cls of requiredEvidenceClasses) {
              const present = evidenceItems.some((e) => e && e.class === cls);
              if (!present) {
                core.setFailed(`❌ AIV Canonical packet missing required evidence class ${cls} for risk tier ${riskTier}.`);
                return;
              }
            }

            const isGitHubActionsRun = (ref) => typeof ref === 'string' && /github\.com\/[^/]+\/[^/]+\/actions\/runs\/\d+/.test(ref);
            const classARunFound = classAItems.some((e) =>
              Array.isArray(e.artifacts) && e.artifacts.some((a) => a && isGitHubActionsRun(a.reference)),
            );

            const classARunRef = (() => {
              for (const e of classAItems) {
                if (!Array.isArray(e.artifacts)) continue;
                for (const a of e.artifacts) {
                  if (a && isGitHubActionsRun(a.reference)) return a.reference;
                }
              }
              return null;
            })();

            if (!classARunFound) {
              const isDraft = Boolean(pr?.draft);
              if (isDraft) {
                core.warning('⚠️ AIV Canonical packet has Class A evidence but no GitHub Actions run URL (actions/runs/XXXXXX) referenced in Class A artifacts.');
              } else {
                core.setFailed('❌ AIV Canonical L1 requires at least one Class A artifact referencing a GitHub Actions run URL (actions/runs/XXXXXX).');
                return;
              }
            }

            let workflowRunId = null;
            if (classARunRef) {
              const m = classARunRef.match(/actions\/runs\/(\d+)/);
              if (m) workflowRunId = Number(m[1]);
            }

            if (!workflowRunId && !Boolean(pr?.draft)) {
              core.setFailed('❌ AIV Canonical packet could not parse workflow run id from Class A run URL.');
              return;
            }

            let workflowRun = null;
            if (workflowRunId) {
              try {
                const runResp = await github.rest.actions.getWorkflowRun({
                  owner,
                  repo,
                  run_id: workflowRunId,
                });
                workflowRun = runResp.data;
              } catch (err) {
                core.setFailed('❌ AIV Canonical packet Class A run URL could not be fetched via GitHub Actions API.');
                return;
              }

              if (workflowRun && workflowRun.head_sha && workflowRun.head_sha !== headSha) {
                core.setFailed(
                  `❌ AIV Canonical packet Class A CI run head_sha mismatch. Run: ${workflowRun.head_sha}, PR: ${headSha}`,
                );
                return;
              }
            }

            const listAllRunArtifacts = async () => {
              const artifacts = [];
              let page = 1;
              const MAX_PAGES = 20;
              while (true) {
                if (page > MAX_PAGES) break;
                const resp = await github.rest.actions.listWorkflowRunArtifacts({
                  owner,
                  repo,
                  run_id: workflowRunId,
                  per_page: 100,
                  page,
                });
                const batch = resp?.data?.artifacts || [];
                artifacts.push(...batch);
                if (batch.length < 100) break;
                page += 1;
              }
              return artifacts;
            };

            let runArtifacts = null;
            let aivEvidenceArtifact = null;
            if (workflowRunId) {
              try {
                runArtifacts = await listAllRunArtifacts();
              } catch (err) {
                core.setFailed('❌ AIV Canonical packet could not list artifacts for Class A run via GitHub Actions API.');
                return;
              }
              aivEvidenceArtifact = (runArtifacts || []).find((a) => a && a.name === 'aiv-evidence' && !a.expired);
            }

            if (aivEvidenceArtifact && aivEvidenceArtifact.id) {
              core.setOutput('aiv_evidence_artifact_id', String(aivEvidenceArtifact.id));
            }

            {
              const isDraft = Boolean(pr?.draft);
              if (!aivEvidenceArtifact) {
                if (isDraft) {
                  core.warning('⚠️ AIV Canonical packet expects a non-expired aiv-evidence artifact on the referenced CI run, but none was found.');
                } else {
                  core.setFailed('❌ A-005 AIV Canonical packet requires a non-expired aiv-evidence artifact on the referenced CI run.');
                  return;
                }
              }
            }

            if (['R2', 'R3'].includes(riskTier) && aivEvidenceArtifact && aivEvidenceArtifact.id) {
              const expectedArtifactUrlRe = new RegExp(`actions\/runs\/${workflowRunId}\/artifacts\/${aivEvidenceArtifact.id}(?:$|\\?)`);
              const classCItems = evidenceItems.filter((e) => e && e.class === 'C');
              const classCReferencesArtifact = classCItems.some((e) =>
                Array.isArray(e.artifacts) && e.artifacts.some((a) => a && typeof a.reference === 'string' && expectedArtifactUrlRe.test(a.reference)),
              );

              if (!classCReferencesArtifact) {
                core.setFailed(
                  '❌ AIV Canonical packet Class C evidence must reference the exact aiv-evidence artifact URL from the referenced run.',
                );
                return;
              }
            }

            const classesToCheckImmutability = new Set(['B', 'E']);
            const isGitHubBlobOrTree = (ref) => typeof ref === 'string' && /github\.com\/[^/]+\/[^/]+\/(blob|tree)\//.test(ref);
            const isGitHubBlobOrTreeWithFullSha = (ref) =>
              typeof ref === 'string' && /github\.com\/[^/]+\/[^/]+\/(blob|tree)\/[0-9a-f]{40}([0-9a-f]{24})?(\/|$)/i.test(ref);

            const hasLineAnchor = (ref) => typeof ref === 'string' && /#L\d+(-L\d+)?$/.test(ref);

            if (['R2', 'R3'].includes(riskTier)) {
              const classBItems = evidenceItems.filter((e) => e && e.class === 'B');
              const missingAnchors = [];
              for (const e of classBItems) {
                if (!Array.isArray(e.artifacts)) continue;
                for (const a of e.artifacts) {
                  if (!a || typeof a.reference !== 'string') continue;
                  if (!isGitHubBlobOrTreeWithFullSha(a.reference)) continue;
                  if (!hasLineAnchor(a.reference)) missingAnchors.push(a.reference);
                }
              }
              if (missingAnchors.length > 0) {
                core.setFailed('❌ AIV Canonical packet Class B GitHub permalinks must include line anchors for R2+ (e.g., #L10-L20).');
                return;
              }
            }

            if (['R2', 'R3'].includes(riskTier)) {
              const classCItems = evidenceItems.filter((e) => e && e.class === 'C');
              const requiredSemantic = /\b(ast|coverage|collect|junit|json)\b/i;
              const nonEmptyMethods = classCItems.length > 0 && classCItems.every((e) => {
                const vm = typeof e.validation_method === 'string' ? e.validation_method : '';
                return Boolean(vm && vm.trim());
              });
              if (!nonEmptyMethods) {
                core.setFailed('❌ C-002 AIV Canonical packet Class C validation_method MUST be documented and non-empty.');
                return;
              }

              const semanticItems = classCItems.filter((e) => {
                const vm = typeof e.validation_method === 'string' ? e.validation_method : '';
                return Boolean(vm && requiredSemantic.test(vm));
              });
              if (semanticItems.length === 0) {
                core.setFailed('❌ C-004 AIV Canonical packet MUST include at least one Class C test integrity method indicating semantic analysis (AST/coverage/JUnit/JSON), not only string matching.');
                return;
              }
            }

            const collectBadRefs = (cls, predicate) => {
              const bad = [];
              for (const e of evidenceItems) {
                if (!e || e.class !== cls) continue;
                if (!Array.isArray(e.artifacts)) continue;
                for (const a of e.artifacts) {
                  if (!a || typeof a.reference !== 'string') continue;
                  if (predicate(a.reference)) bad.push(a.reference);
                }
              }
              return bad;
            };

            const badNonShaB = collectBadRefs('B', (ref) => isGitHubBlobOrTree(ref) && !isGitHubBlobOrTreeWithFullSha(ref));
            const badNonShaE = collectBadRefs('E', (ref) => isGitHubBlobOrTree(ref) && !isGitHubBlobOrTreeWithFullSha(ref));

            if (badNonShaE.length > 0) {
              core.setFailed('❌ Class E links must target commit SHA, not mutable branch (main/master/develop/dev/staging).');
              return;
            }

            if (badNonShaB.length > 0) {
              core.setFailed('❌ Class B links must target commit SHA, not mutable branch (main/master/develop/dev/staging).');
              return;
            }

            const mutableB = collectBadRefs('B', (ref) => mutableBranchPattern.test(ref));
            const mutableE = collectBadRefs('E', (ref) => mutableBranchPattern.test(ref));

            if (mutableE.length > 0) {
              core.setFailed('❌ Class E links must target commit SHA, not mutable branch (main/master/develop/dev/staging).');
              return;
            }

            if (mutableB.length > 0) {
              core.setFailed('❌ Class B links must target commit SHA, not mutable branch (main/master/develop/dev/staging).');
              return;
            }

            const mutableAnyEvidence = [];
            for (const e of evidenceItems) {
              if (!e || !Array.isArray(e.artifacts)) continue;
              for (const a of e.artifacts) {
                if (!a || typeof a.reference !== 'string') continue;
                if (mutableBranchPattern.test(a.reference)) mutableAnyEvidence.push(a.reference);
              }
            }
            if (mutableAnyEvidence.length > 0) {
              core.setFailed('❌ CT-004 All evidence artifact references must satisfy immutability requirements (no branch-based blob/tree links).');
              return;
            }

            core.info('✅ AIV Canonical packet validated (Option A / L1 subset)');

      - name: Inspect referenced aiv-evidence artifact
        id: inspect
        if: ${{ steps.validate.outputs.canonical_enabled == 'true' && steps.validate.outputs.aiv_evidence_artifact_id != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RISK_TIER: ${{ steps.validate.outputs.risk_tier }}
        run: |
          set -euo pipefail

          passed=true
          semantic_passed=true
          durable_passed=true
          files_present=true
          manifest_valid=true

          ARTIFACT_ID="${{ steps.validate.outputs.aiv_evidence_artifact_id }}"
          API_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip"

          curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$API_URL" -o aiv-evidence.zip

          unzip -Z1 aiv-evidence.zip > aiv-evidence.files

          validate_c=false
          if [ "${RISK_TIER:-}" = "R2" ] || [ "${RISK_TIER:-}" = "R3" ]; then
            validate_c=true
          fi

          required_files=("class_a_execution.json")
          if [ "$validate_c" = true ]; then
            required_files+=(
              "astro_check.txt"
              "type_check.txt"
              "build.txt"
              "lint.txt"
              "validate_target_humanlayer.txt"
              "validate_case_study_cs_verification_friction.txt"
              "negative_evidence.txt"
              "class_c_negative.json"
            )
          fi

          semantic_required_file="test_integrity_semantic.json"
          durable_required_file="durable_storage_oci.json"

          for f in "${required_files[@]}"; do
            if ! grep -Fxq "$f" aiv-evidence.files; then
              echo "Missing required AIV evidence file in aiv-evidence artifact: $f" >&2
              passed=false
              files_present=false
            fi
          done

          if [ "$validate_c" = true ]; then
            if ! grep -Fxq "$semantic_required_file" aiv-evidence.files; then
              echo "Missing required semantic test integrity report in aiv-evidence artifact: $semantic_required_file" >&2
              semantic_passed=false
            fi

            if ! grep -Fxq "$durable_required_file" aiv-evidence.files; then
              echo "Missing required durable storage export metadata in aiv-evidence artifact: $durable_required_file" >&2
              durable_passed=false
            fi
          fi

          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          REPO_NAME="${{ github.repository }}"
          export PR_HEAD_SHA PR_BASE_SHA REPO_NAME

          if [ "$passed" = true ]; then
            unzip -p aiv-evidence.zip class_a_execution.json > class_a_execution.json
            if [ "$validate_c" = true ]; then
              unzip -p aiv-evidence.zip class_c_negative.json > class_c_negative.json
              if [ "$semantic_passed" = true ]; then
                unzip -p aiv-evidence.zip test_integrity_semantic.json > test_integrity_semantic.json
              fi
              if [ "$durable_passed" = true ]; then
                unzip -p aiv-evidence.zip durable_storage_oci.json > durable_storage_oci.json
              fi
            fi

            VALIDATE_C="$validate_c" python3 - <<'PY'
          if True:
            import json, os
            
            pr_head = (os.environ.get('PR_HEAD_SHA') or '').strip()
            pr_base = (os.environ.get('PR_BASE_SHA') or '').strip()
            repo = (os.environ.get('REPO_NAME') or '').strip()
            
            def fail(msg, errors):
              errors.append(msg)
            
            errors = []
            semantic_errors = []
            durable_errors = []
            
            try:
              with open('class_a_execution.json','r',encoding='utf-8') as f:
                a = json.load(f)
            except Exception as e:
              fail(f'class_a_execution.json is not valid JSON: {e}', errors)
              a = None
            
            validate_c = (os.environ.get('VALIDATE_C') or '').strip().lower() == 'true'

            c = None
            if validate_c:
              try:
                with open('class_c_negative.json','r',encoding='utf-8') as f:
                  c = json.load(f)
              except Exception as e:
                fail(f'class_c_negative.json is not valid JSON: {e}', errors)
            
            t = None
            if validate_c:
              if os.path.exists('test_integrity_semantic.json'):
                try:
                  with open('test_integrity_semantic.json','r',encoding='utf-8') as f:
                    t = json.load(f)
                except Exception as e:
                  semantic_errors.append(f'test_integrity_semantic.json is not valid JSON: {e}')
              else:
                semantic_errors.append('test_integrity_semantic.json is missing')

            d = None
            if validate_c:
              if os.path.exists('durable_storage_oci.json'):
                try:
                  with open('durable_storage_oci.json','r',encoding='utf-8') as f:
                    d = json.load(f)
                except Exception as e:
                  durable_errors.append(f'durable_storage_oci.json is not valid JSON: {e}')
              else:
                durable_errors.append('durable_storage_oci.json is missing')
            
            def is_non_empty_str(v):
              return isinstance(v, str) and v.strip() != ''
            
            def is_int(v):
              return isinstance(v, int)
            
            if a is not None:
              if a.get('schema_version') != '1.0.0':
                fail('class_a_execution.json.schema_version must be 1.0.0', errors)
            
              head = a.get('head_sha','')
              if not is_non_empty_str(head):
                fail('class_a_execution.json.head_sha must be non-empty', errors)
              elif pr_head and head.lower() != pr_head.lower():
                fail(f'class_a_execution.json.head_sha mismatch (manifest={head}, pr={pr_head})', errors)
            
              run = a.get('run')
              if not isinstance(run, dict):
                fail('class_a_execution.json.run must be an object', errors)
              else:
                if repo and run.get('repository') != repo:
                  fail(f'class_a_execution.json.run.repository mismatch (got={run.get("repository")}, expected={repo})', errors)
                if not is_non_empty_str(run.get('run_id','')):
                  fail('class_a_execution.json.run.run_id must be non-empty', errors)
            
              env = a.get('execution_environment')
              if not isinstance(env, dict):
                fail('class_a_execution.json.execution_environment must be an object', errors)
              else:
                osinfo = env.get('os')
                if not isinstance(osinfo, dict) or not is_non_empty_str(osinfo.get('name','')) or not is_non_empty_str(osinfo.get('release','')):
                  fail('class_a_execution.json.execution_environment.os must include name and release', errors)
                if not is_non_empty_str(env.get('node','')):
                  fail('class_a_execution.json.execution_environment.node must be non-empty', errors)
                if not is_non_empty_str(env.get('npm','')):
                  fail('class_a_execution.json.execution_environment.npm must be non-empty', errors)
            
              tr = a.get('test_results')
              if not isinstance(tr, dict):
                fail('class_a_execution.json.test_results must be an object', errors)
              else:
                for k in ('pass','fail','skip'):
                  if not is_int(tr.get(k)):
                    fail(f'class_a_execution.json.test_results.{k} must be an integer', errors)
            
              tl = a.get('test_list')
              if not isinstance(tl, list) or len(tl) == 0:
                fail('class_a_execution.json.test_list must be a non-empty array', errors)
            
              checks = a.get('executed_checks')
              if not isinstance(checks, list) or len(checks) == 0:
                fail('class_a_execution.json.executed_checks must be a non-empty array', errors)
            
            if validate_c and c is not None:
              if c.get('schema_version') != '1.0.0':
                fail('class_c_negative.json.schema_version must be 1.0.0', errors)
            
              head = c.get('head_sha','')
              if not is_non_empty_str(head):
                fail('class_c_negative.json.head_sha must be non-empty', errors)
              elif pr_head and head.lower() != pr_head.lower():
                fail(f'class_c_negative.json.head_sha mismatch (manifest={head}, pr={pr_head})', errors)
            
              sm = c.get('search_method')
              if not isinstance(sm, dict):
                fail('class_c_negative.json.search_method must be an object', errors)
              else:
                if not is_non_empty_str(sm.get('tool','')):
                  fail('class_c_negative.json.search_method.tool must be non-empty', errors)
                if sm.get('deterministic') is not True:
                  fail('class_c_negative.json.search_method.deterministic must be true', errors)
            
              scope = c.get('search_scope')
              if not isinstance(scope, list) or len(scope) == 0:
                fail('class_c_negative.json.search_scope must be a non-empty array', errors)
            
              patterns = c.get('patterns')
              if not isinstance(patterns, list) or len(patterns) == 0:
                fail('class_c_negative.json.patterns must be a non-empty array', errors)
            
              if c.get('search_results_artifact') != 'negative_evidence.txt':
                fail('class_c_negative.json.search_results_artifact must equal negative_evidence.txt', errors)
            
              ti = c.get('test_integrity')
              if not isinstance(ti, dict) or ti.get('machine_readable') is not True:
                fail('class_c_negative.json.test_integrity.machine_readable must be true', errors)
              else:
                ref = ti.get('required_evidence_files')
                if not isinstance(ref, list) or len(ref) == 0:
                  fail('class_c_negative.json.test_integrity.required_evidence_files must be a non-empty array', errors)
                if ti.get('semantic_report_artifact') != 'test_integrity_semantic.json':
                  fail('class_c_negative.json.test_integrity.semantic_report_artifact must equal test_integrity_semantic.json', errors)
                method = ti.get('method')
                if not is_non_empty_str(method) or 'semantic' not in method.lower():
                  fail('class_c_negative.json.test_integrity.method must indicate semantic analysis', errors)

            if validate_c and t is not None:
              if t.get('schema_version') != '1.0.0':
                semantic_errors.append('test_integrity_semantic.json.schema_version must be 1.0.0')

              head = t.get('head_sha','')
              if not is_non_empty_str(head):
                semantic_errors.append('test_integrity_semantic.json.head_sha must be non-empty')
              elif pr_head and head.lower() != pr_head.lower():
                semantic_errors.append(f'test_integrity_semantic.json.head_sha mismatch (report={head}, pr={pr_head})')

              report_base = t.get('base_sha','')
              if is_non_empty_str(pr_base) and is_non_empty_str(report_base) and pr_base.lower() != report_base.lower():
                semantic_errors.append(f'test_integrity_semantic.json.base_sha mismatch (report={report_base}, pr={pr_base})')

              if t.get('overall_result') != 'PASS':
                semantic_errors.append('test_integrity_semantic.json.overall_result must be PASS')

            if validate_c and d is not None:
              if d.get('schema_version') != '1.0.0':
                durable_errors.append('durable_storage_oci.json.schema_version must be 1.0.0')

              head = d.get('head_sha','')
              if not is_non_empty_str(head):
                durable_errors.append('durable_storage_oci.json.head_sha must be non-empty')
              elif pr_head and head.lower() != pr_head.lower():
                durable_errors.append(f'durable_storage_oci.json.head_sha mismatch (metadata={head}, pr={pr_head})')

              if d.get('backend') != 'ghcr_oci':
                durable_errors.append('durable_storage_oci.json.backend must be ghcr_oci')

              if d.get('export_result') != 'SUCCESS':
                durable_errors.append('durable_storage_oci.json.export_result must be SUCCESS')

              digest = d.get('digest','')
              if not is_non_empty_str(digest):
                durable_errors.append('durable_storage_oci.json.digest must be non-empty')
              else:
                import re
                if not re.fullmatch(r'sha256:[0-9a-f]{64}', digest.strip().lower()):
                  durable_errors.append('durable_storage_oci.json.digest must match sha256:<64 hex>')

              oci_ref = d.get('oci_ref_digest','')
              if not is_non_empty_str(oci_ref):
                durable_errors.append('durable_storage_oci.json.oci_ref_digest must be non-empty')
              elif is_non_empty_str(digest) and digest not in oci_ref:
                durable_errors.append('durable_storage_oci.json.oci_ref_digest must include digest')

              tar_sha = d.get('tar_sha256','')
              if not is_non_empty_str(tar_sha):
                durable_errors.append('durable_storage_oci.json.tar_sha256 must be non-empty')

            with open('manifest_check.txt','w',encoding='utf-8') as f:
              if errors:
                f.write('FAIL\n')
                for e in errors:
                  f.write(f"{e}\n")
              else:
                f.write('PASS\n')

            with open('semantic_check.txt','w',encoding='utf-8') as f:
              if semantic_errors:
                f.write('FAIL\n')
                for e in semantic_errors:
                  f.write(f"{e}\n")
              else:
                f.write('PASS\n')

            with open('durable_check.txt','w',encoding='utf-8') as f:
              if durable_errors:
                f.write('FAIL\n')
                for e in durable_errors:
                  f.write(f"{e}\n")
              else:
                f.write('PASS\n')
          PY
          else
            echo "FAIL" > manifest_check.txt
          fi

          if head -n 1 manifest_check.txt | grep -Fxq "FAIL"; then
            echo "Manifest validation failed:" >&2
            cat manifest_check.txt >&2 || true
            passed=false
            manifest_valid=false
          fi

          if [ -f semantic_check.txt ] && head -n 1 semantic_check.txt | grep -Fxq "FAIL"; then
            echo "Semantic test integrity validation failed:" >&2
            cat semantic_check.txt >&2 || true
            semantic_passed=false
          fi

          if [ "$validate_c" = true ] && [ -f durable_check.txt ] && head -n 1 durable_check.txt | grep -Fxq "FAIL"; then
            echo "Durable storage export validation failed:" >&2
            cat durable_check.txt >&2 || true
            durable_passed=false
          fi

          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "semantic_passed=$semantic_passed" >> "$GITHUB_OUTPUT"
          echo "durable_passed=$durable_passed" >> "$GITHUB_OUTPUT"
          echo "files_present=$files_present" >> "$GITHUB_OUTPUT"
          echo "manifest_valid=$manifest_valid" >> "$GITHUB_OUTPUT"

      - name: Finalize validator output
        if: always()
        uses: actions/github-script@v7
        env:
          INSPECT_RAN: ${{ steps.inspect.outcome != '' && steps.inspect.outcome != 'skipped' }}
          INSPECT_OUTCOME: ${{ steps.inspect.outcome }}
          INSPECT_PASSED: ${{ steps.inspect.outputs.passed }}
          INSPECT_SEMANTIC_PASSED: ${{ steps.inspect.outputs.semantic_passed }}
          INSPECT_DURABLE_PASSED: ${{ steps.inspect.outputs.durable_passed }}
          INSPECT_FILES_PRESENT: ${{ steps.inspect.outputs.files_present }}
          INSPECT_MANIFEST_VALID: ${{ steps.inspect.outputs.manifest_valid }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let payload;
            try {
              payload = JSON.parse(fs.readFileSync('aiv_validation_result.json', 'utf8'));
            } catch (err) {
              payload = {
                validation_result: {
                  validator_id: 'aiv-guard@1.0.0',
                  packet_id: '',
                  repository: `${context.repo.owner}/${context.repo.repo}`,
                  pr_id: context.payload.pull_request?.number ?? 0,
                  head_sha: context.payload.pull_request?.head?.sha ?? '',
                  validated_at: new Date().toISOString(),
                  overall_result: 'FAIL',
                  compliance_level: 'NON-COMPLIANT',
                  risk_tier_validated: 'R0',
                  evidence_class_results: [],
                  validation_rule_results: [],
                  findings: [],
                  block_count: 0,
                  warn_count: 0,
                  info_count: 0,
                },
              };
            }

            const vr = payload.validation_result;
            if (!Array.isArray(vr.findings)) vr.findings = [];
            if (!Array.isArray(vr.validation_rule_results)) vr.validation_rule_results = [];

            const upsertRuleResult = (rule_id, result, finding_id) => {
              const entry = { rule_id, result };
              if (result === 'FAIL' && finding_id) entry.finding_id = finding_id;
              const idx = vr.validation_rule_results.findIndex((r) => r && r.rule_id === rule_id);
              if (idx === -1) vr.validation_rule_results.push(entry);
              else vr.validation_rule_results[idx] = entry;
            };

            const addWarnFinding = (rule_id, description, remediation) => {
              const fid = `F-${rule_id}-WARN-${vr.findings.length + 1}`;
              vr.findings.push({
                id: fid,
                severity: 'WARN',
                rule_id,
                description,
                remediation,
              });
              upsertRuleResult(rule_id, 'FAIL', fid);
            };

            const upsertIfMissing = (rule_id, result) => {
              const idx = vr.validation_rule_results.findIndex((r) => r && r.rule_id === rule_id);
              if (idx === -1) vr.validation_rule_results.push({ rule_id, result });
            };

            const inspectRan = String(process.env.INSPECT_RAN || '') === 'true';
            const inspectOutcome = String(process.env.INSPECT_OUTCOME || '');
            const inspectPassed = String(process.env.INSPECT_PASSED || 'true') === 'true';
            const inspectSemanticPassed = String(process.env.INSPECT_SEMANTIC_PASSED || 'true') === 'true';
            const inspectDurablePassed = String(process.env.INSPECT_DURABLE_PASSED || 'true') === 'true';
            const inspectFilesPresent = String(process.env.INSPECT_FILES_PRESENT || 'true') === 'true';
            const inspectManifestValid = String(process.env.INSPECT_MANIFEST_VALID || 'true') === 'true';

            const tier = typeof vr.risk_tier_validated === 'string' ? vr.risk_tier_validated : '';
            const isR2Plus = tier === 'R2' || tier === 'R3';

            const body = context.payload.pull_request?.body || '';
            const packetSourceMatch = body.match(/Packet Source:\s*`(.+?)`/);
            const packetSourcePlainMatch = body.match(/Packet Source:\s*(\S+)/);
            let packetContent = body;
            const packetSourcePath = packetSourceMatch?.[1] || packetSourcePlainMatch?.[1] || '';
            if (packetSourcePath) {
              const filePath = String(packetSourcePath || '').trim();
              const githubRoot = path.resolve('.github');
              const resolved = path.resolve(filePath);
              const isWithinGithubRoot = resolved === githubRoot || resolved.startsWith(githubRoot + path.sep);
              if (filePath.startsWith('.github/') && isWithinGithubRoot) {
                try {
                  packetContent = fs.readFileSync(resolved, 'utf8');
                } catch (err) {
                  packetContent = body;
                }
              }
            }
            const canonicalBlockRe = /```aiv-canonical-json\s*([\s\S]*?)```/m;
            const canonicalMatch = packetContent.match(canonicalBlockRe);
            const canonicalEnabled = Boolean(canonicalMatch && canonicalMatch[1]);

            let canonicalPacket = null;
            if (canonicalEnabled) {
              try {
                canonicalPacket = JSON.parse(canonicalMatch[1]);
              } catch (err) {
                canonicalPacket = null;
              }
            }

            const knownLimitations = Array.isArray(canonicalPacket?.known_limitations)
              ? canonicalPacket.known_limitations.filter((v) => typeof v === 'string')
              : [];

            const hasKnownLimitation = (re) => knownLimitations.some((l) => re.test(l));

            if (canonicalEnabled) {
              upsertIfMissing('B-005', 'PASS');
              const defaultA = inspectRan && inspectOutcome === 'success' ? 'PASS' : 'SKIP';
              upsertIfMissing('A-004', defaultA);
              upsertIfMissing('A-006', defaultA);
              if (isR2Plus) {
                upsertIfMissing('C-005', 'PASS');
                upsertIfMissing('C-006', 'PASS');
              } else {
                upsertIfMissing('C-005', 'SKIP');
                upsertIfMissing('C-006', 'SKIP');
              }
            }

            if (isR2Plus) {
              if (inspectRan && inspectOutcome && inspectOutcome !== 'success') {
                const fid = `F-CT-003-${vr.findings.length + 1}`;
                vr.findings.push({
                  id: fid,
                  severity: 'BLOCK',
                  rule_id: 'CT-003',
                  description: `Failed to inspect referenced aiv-evidence artifact (inspect step outcome: ${inspectOutcome}).`,
                  remediation: 'Ensure the referenced CI run uploaded aiv-evidence and the validator has permissions to download it.',
                });
                upsertRuleResult('CT-003', 'FAIL', fid);
              } else if (inspectRan && !inspectFilesPresent) {
                const fid = `F-CT-003-${vr.findings.length + 1}`;
                vr.findings.push({
                  id: fid,
                  severity: 'BLOCK',
                  rule_id: 'CT-003',
                  description: 'Missing one or more required evidence files in the referenced aiv-evidence artifact.',
                  remediation: 'Ensure the referenced CI run uploaded the expected aiv-evidence files and the packet references the correct run/artifact.',
                });
                upsertRuleResult('CT-003', 'FAIL', fid);
              } else if (!inspectRan) {
                upsertRuleResult('CT-003', 'SKIP');
              } else {
                upsertRuleResult('CT-003', 'PASS');
              }
            } else {
              upsertRuleResult('CT-003', 'SKIP');
            }

            if (inspectRan && inspectOutcome === 'success' && inspectFilesPresent && !inspectManifestValid) {
              const fid = `F-A-003-${vr.findings.length + 1}`;
              vr.findings.push({
                id: fid,
                severity: 'BLOCK',
                rule_id: 'A-003',
                description: 'Class A execution manifest validation failed (see manifest_check.txt in aiv-evidence artifact).',
                remediation: 'Fix class_a_execution.json fields (including test result counts) and re-run the referenced CI workflow.',
              });
              upsertRuleResult('A-003', 'FAIL', fid);
            } else if (inspectRan && inspectOutcome === 'success' && inspectFilesPresent && inspectManifestValid) {
              upsertRuleResult('A-003', 'PASS');
            } else if (!inspectRan) {
              upsertRuleResult('A-003', 'SKIP');
            }

            if (isR2Plus && inspectRan && inspectOutcome === 'success') {
              if (!inspectPassed) {
                upsertRuleResult('C-004', 'SKIP');
              } else if (!inspectSemanticPassed) {
                const fid = `F-C-004-${vr.findings.length + 1}`;
                vr.findings.push({
                  id: fid,
                  severity: 'BLOCK',
                  rule_id: 'C-004',
                  description: 'Semantic test integrity report (test_integrity_semantic.json) missing, invalid, or indicates FAIL.',
                  remediation: 'Ensure verify-architecture workflow uploads test_integrity_semantic.json and that it reports PASS for head/base SHA.',
                });
                upsertRuleResult('C-004', 'FAIL', fid);
              } else {
                upsertRuleResult('C-004', 'PASS');
              }
            } else {
              upsertRuleResult('C-004', 'SKIP');
            }

            if (isR2Plus) {
              if (!inspectRan || inspectOutcome !== 'success') {
                upsertRuleResult('A-005', 'SKIP');
              } else if (!inspectDurablePassed) {
                const fid = `F-A-005-${vr.findings.length + 1}`;
                vr.findings.push({
                  id: fid,
                  severity: 'BLOCK',
                  rule_id: 'A-005',
                  description: 'Durable retention export metadata (durable_storage_oci.json) missing, invalid, or indicates FAIL for R2+.',
                  remediation: 'Ensure verify-architecture workflow exports aiv-evidence to durable storage and uploads durable_storage_oci.json with export_result=SUCCESS and a content-addressed digest.',
                });
                upsertRuleResult('A-005', 'FAIL', fid);
              } else {
                upsertRuleResult('A-005', 'PASS');
              }
            }

            if (canonicalEnabled) {
              let classA = null;
              if (inspectRan && inspectOutcome === 'success') {
                try {
                  classA = JSON.parse(fs.readFileSync('class_a_execution.json', 'utf8'));
                } catch (err) {
                  classA = null;
                }
              }

              const executedChecks = Array.isArray(classA?.executed_checks) ? classA.executed_checks : [];
              const execIds = executedChecks
                .map((c) => (c && typeof c.id === 'string' ? c.id : null))
                .filter((v) => typeof v === 'string');

              const staticIds = new Set(['lint', 'type_check', 'astro_check']);
              const hasStatic = execIds.some((id) => staticIds.has(id));
              if (inspectRan && inspectOutcome === 'success' && classA && !hasStatic) {
                const hasJust = hasKnownLimitation(/static\s*analysis|lint|type\s*-?check|astro\s*check|n\/?a/i);
                if (!hasJust) {
                  addWarnFinding(
                    'A-004',
                    '⚠️ A-004 Static analysis appears to be N/A (no static checks in class_a_execution.json.executed_checks) without justification in known_limitations.',
                    'If static analysis is intentionally N/A, document justification in known_limitations; otherwise include lint/typecheck evidence in Class A.',
                  );
                }
              } else if (!(inspectRan && inspectOutcome === 'success' && classA)) {
                upsertRuleResult('A-004', 'SKIP');
              }

              const testList = Array.isArray(classA?.test_list) ? classA.test_list : [];
              const allStrings = testList.every((t) => typeof t === 'string' && t.trim());
              const unique = new Set(testList).size === testList.length;
              const matchesExecuted = JSON.stringify(testList) === JSON.stringify(execIds);
              if (inspectRan && inspectOutcome === 'success' && classA && (!allStrings || !unique || !matchesExecuted)) {
                addWarnFinding(
                  'A-006',
                  '⚠️ A-006 Test list may not be reproducible (test_list must be a stable, unique list matching executed_checks ids).',
                  'Ensure class_a_execution.json.test_list is deterministic, unique, and matches executed_checks[].id ordering.',
                );
              } else if (!(inspectRan && inspectOutcome === 'success' && classA)) {
                upsertRuleResult('A-006', 'SKIP');
              }

              const claims = Array.isArray(canonicalPacket?.claims) ? canonicalPacket.claims : [];
              const invalidSymbols = [];
              const symbolCandidates = [];
              for (const cl of claims) {
                const funcs = cl?.scope?.functions;
                if (!Array.isArray(funcs)) continue;
                for (const f of funcs) {
                  if (typeof f !== 'string') {
                    invalidSymbols.push(String(f));
                    continue;
                  }
                  const s = f.trim();
                  if (!s) {
                    invalidSymbols.push(f);
                    continue;
                  }
                  if (!/^[A-Za-z_$][A-Za-z0-9_$]*(\.[A-Za-z_$][A-Za-z0-9_$]*)*$/.test(s)) {
                    invalidSymbols.push(s);
                    continue;
                  }

                  symbolCandidates.push(s);
                }
              }

              const missingSymbols = [];
              if (symbolCandidates.length > 0) {
                const uniqueSymbols = Array.from(new Set(symbolCandidates));
                const owner = context.repo.owner;
                const repo = context.repo.repo;
                const pull_number = context.payload.pull_request?.number;

                let prFiles = null;
                if (pull_number && typeof pull_number === 'number') {
                  try {
                    const files = [];
                    let page = 1;
                    const MAX_PAGES = 100;
                    while (true) {
                      if (page > MAX_PAGES) break;
                      const resp = await github.rest.pulls.listFiles({
                        owner,
                        repo,
                        pull_number,
                        per_page: 100,
                        page,
                      });
                      if (!resp.data || resp.data.length === 0) break;
                      files.push(...resp.data);
                      if (resp.data.length < 100) break;
                      page += 1;
                    }
                    prFiles = files;
                  } catch (err) {
                    prFiles = null;
                  }
                }

                const patchText = Array.isArray(prFiles)
                  ? prFiles
                      .map((f) => (typeof f.patch === 'string' ? f.patch : ''))
                      .filter(Boolean)
                      .join('\n')
                  : '';

                for (const sym of uniqueSymbols.slice(0, 25)) {
                  const last = sym.split('.').pop() || sym;
                  const inPatch = patchText && (patchText.includes(sym) || patchText.includes(last));
                  if (inPatch) continue;

                  try {
                    const q = `${last} repo:${owner}/${repo}`;
                    const resp = await github.rest.search.code({ q, per_page: 1 });
                    const count = typeof resp?.data?.total_count === 'number' ? resp.data.total_count : 0;
                    if (count <= 0) missingSymbols.push(sym);
                  } catch (err) {
                  }
                }
              }

              if (invalidSymbols.length > 0 || missingSymbols.length > 0) {
                const inv = invalidSymbols.slice(0, 10).join(', ');
                const miss = missingSymbols.slice(0, 10).join(', ');
                const parts = [];
                if (invalidSymbols.length > 0) parts.push(`Invalid identifiers: ${inv}${invalidSymbols.length > 10 ? ' ...' : ''}`);
                if (missingSymbols.length > 0) parts.push(`Not found: ${miss}${missingSymbols.length > 10 ? ' ...' : ''}`);
                addWarnFinding(
                  'B-005',
                  `⚠️ B-005 Symbol references must be valid identifiers in the codebase. ${parts.join(' | ')}`,
                  'Use stable function/class/method identifiers (e.g., Foo.bar) and ensure they correspond to real code symbols.',
                );
              }

              if (isR2Plus) {
                const owner = context.repo.owner;
                const repo = context.repo.repo;
                const pull_number = context.payload.pull_request?.number;

                if (!pull_number || typeof pull_number !== 'number') {
                  upsertRuleResult('C-005', 'SKIP');
                  upsertRuleResult('C-006', 'SKIP');
                } else {
                  const listAllFiles = async () => {
                    const files = [];
                    let page = 1;
                    const MAX_PAGES = 100;
                    while (true) {
                      if (page > MAX_PAGES) break;
                      const resp = await github.rest.pulls.listFiles({
                        owner,
                        repo,
                        pull_number,
                        per_page: 100,
                        page,
                      });
                      if (!resp.data || resp.data.length === 0) break;
                      files.push(...resp.data);
                      if (resp.data.length < 100) break;
                      page += 1;
                    }
                    return files;
                  };

                  let evaluated = false;
                  let addedSkip = false;
                  let coverageDecreased = false;
                  try {
                    const prFiles = await listAllFiles();
                    evaluated = Array.isArray(prFiles);
                    const skipRe = /(\bit\.skip\b|\btest\.skip\b|\bdescribe\.skip\b|\bxdescribe\b|\bxit\b|\bxtest\b|pytest\.mark\.skip|@pytest\.mark\.skip|\bskip\(\b)/;
                    const covLineRe = /(coverageThreshold|coverage|threshold)/i;
                    const numberRe = /([0-9]{1,3})/g;

                    for (const f of prFiles) {
                      const patch = typeof f.patch === 'string' ? f.patch : '';
                      if (!patch) continue;
                      const lines = patch.split('\n');
                      const added = lines.filter((l) => l.startsWith('+') && !l.startsWith('+++'));
                      const removed = lines.filter((l) => l.startsWith('-') && !l.startsWith('---'));

                      if (!addedSkip) {
                        if (added.some((l) => skipRe.test(l))) addedSkip = true;
                      }

                      if (!coverageDecreased) {
                        const removedCov = removed.filter((l) => covLineRe.test(l));
                        const addedCov = added.filter((l) => covLineRe.test(l));
                        if (removedCov.length > 0 && addedCov.length > 0) {
                          const removedNums = removedCov
                            .flatMap((l) => Array.from(l.matchAll(numberRe)).map((m) => Number(m[1])))
                            .filter((n) => Number.isFinite(n));
                          const addedNums = addedCov
                            .flatMap((l) => Array.from(l.matchAll(numberRe)).map((m) => Number(m[1])))
                            .filter((n) => Number.isFinite(n));
                          if (removedNums.length > 0 && addedNums.length > 0) {
                            const maxRemoved = Math.max(...removedNums);
                            const minAdded = Math.min(...addedNums);
                            if (minAdded < maxRemoved) coverageDecreased = true;
                          }
                        }
                      }

                      if (addedSkip && coverageDecreased) break;
                    }
                  } catch (err) {
                    evaluated = false;
                  }

                  if (!evaluated) {
                    upsertRuleResult('C-005', 'SKIP');
                    upsertRuleResult('C-006', 'SKIP');
                  } else {
                    if (!addedSkip) upsertRuleResult('C-005', 'PASS');
                    if (!coverageDecreased) upsertRuleResult('C-006', 'PASS');
                  }

                  if (addedSkip) {
                    const hasJust = hasKnownLimitation(/skip|ignored|ignore|xfail|out-of-scope/i);
                    if (!hasJust) {
                      addWarnFinding(
                        'C-005',
                        '⚠️ C-005 New skips appear to have been added, but no justification was found in known_limitations.',
                        'If skips were introduced intentionally, document justification in known_limitations (what was skipped and why).',
                      );
                    }
                  }

                  if (coverageDecreased) {
                    const hasJust = hasKnownLimitation(/coverage|threshold/i);
                    if (!hasJust) {
                      addWarnFinding(
                        'C-006',
                        '⚠️ C-006 Coverage thresholds appear to have been reduced, but no justification was found in known_limitations.',
                        'If coverage decreased intentionally, document justification in known_limitations (impact, mitigation, follow-up).',
                      );
                    }
                  }
                }
              }
            }

            vr.block_count = vr.findings.filter((f) => f.severity === 'BLOCK').length;
            vr.warn_count = vr.findings.filter((f) => f.severity === 'WARN').length;
            vr.info_count = vr.findings.filter((f) => f.severity === 'INFO').length;

            vr.overall_result = vr.block_count > 0 ? 'FAIL' : 'PASS';
            if (vr.overall_result === 'FAIL') vr.compliance_level = 'NON-COMPLIANT';

            fs.writeFileSync('aiv_validation_result.json', `${JSON.stringify(payload, null, 2)}\n`);

            if (vr.overall_result === 'FAIL') {
              core.setFailed('❌ AIV validation failed (see aiv_validation_result.json in aiv-validator-output artifact).');
            }

      - name: Upload validator output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiv-validator-output
          if-no-files-found: error
          path: aiv_validation_result.json
